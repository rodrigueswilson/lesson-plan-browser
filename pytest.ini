[pytest]
# Set Python path to project root for imports
pythonpath = .

# Test discovery paths
testpaths = tests

# Test file patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Output options (pytest-timeout: 120s per test so full suite can finish)
addopts = 
    -v
    --tb=short
    --strict-markers
    --timeout=120

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
