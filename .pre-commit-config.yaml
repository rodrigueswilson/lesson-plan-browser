# Pre-commit hooks for the Bilingual Lesson Plan Builder
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # JSON Schema validation
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.27.3
    hooks:
      - id: check-jsonschema
        name: Validate JSON Schemas
        files: ^schemas/.*\.json$
        args: ['--check-metaschema']
      
      - id: check-jsonschema
        name: Validate Strategy Pack JSONs
        files: ^strategies_pack_v2/.*\.json$
        args: ['--schemafile', 'schemas/strategy_schema.json']
      
      - id: check-jsonschema
        name: Validate Co-Teaching JSONs
        files: ^co_teaching/.*\.json$
        exclude: co_teaching/co_teaching_models\.json
        args: ['--check-metaschema']
  
  # Jinja2 template linting
  - repo: https://github.com/motet-a/jinjalint
    rev: v0.5
    hooks:
      - id: jinjalint
        name: Lint Jinja2 Templates
        files: ^templates/.*\.jinja2$
        args: ['--verbose']
  
  # Python code quality
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: Format Python Code
        language_version: python3.11
  
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Lint Python Code
        args: ['--max-line-length=100', '--extend-ignore=E203,W503']
  
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort Python Imports
        args: ['--profile', 'black']
  
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
      
      - id: end-of-file-fixer
        name: Fix End of Files
      
      - id: check-yaml
        name: Check YAML Syntax
      
      - id: check-json
        name: Check JSON Syntax
        exclude: ^(strategies_pack_v2|co_teaching)/.*\.json$  # Checked by check-jsonschema
      
      - id: check-added-large-files
        name: Check for Large Files
        args: ['--maxkb=1000']
      
      - id: check-merge-conflict
        name: Check for Merge Conflicts
      
      - id: mixed-line-ending
        name: Check Line Endings
        args: ['--fix=lf']
  
  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        name: Lint Markdown Files
        args: ['--fix']
  
  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        name: Security Check Python Code
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ['bandit[toml]']
  
  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: Type Check Python Code
        additional_dependencies: [types-all]
        args: ['--ignore-missing-imports', '--no-strict-optional']

# Snapshot testing guard (custom local hook)
  - repo: local
    hooks:
      - id: snapshot-guard
        name: Guard Snapshot Updates
        entry: python tools/check_snapshot_updates.py
        language: python
        pass_filenames: false
        always_run: true
