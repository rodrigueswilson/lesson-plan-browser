version: '3.8'

services:
  android-builder:
    build:
      context: ..
      dockerfile: docker/Dockerfile.android
    container_name: tauri-android-builder
    volumes:
      - ../frontend:/app/frontend
      - ../backend:/app/backend
      - ../tools:/app/tools
      - ../docker:/app/docker
      - android-build-cache:/root/.cargo
      - android-sdk-cache:/opt/android-sdk
    ports:
      - "1420:1420"
    environment:
      - NODE_ENV=development
      - RUST_LOG=debug
    working_dir: /app/frontend
    command: cargo tauri android build
    # For interactive debugging:
    # stdin_open: true
    # tty: true
    # command: /bin/bash

volumes:
  android-build-cache:
  android-sdk-cache:
