# Alertmanager Configuration
# Routes alerts and attaches runbook URLs

global:
  # Default notification settings
  resolve_timeout: 5m
  
  # Slack webhook (if using Slack)
  # slack_api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'

# Templates for alert annotations
# NOTE: Update this path to match your Alertmanager deployment
# - Docker: Mount templates to /etc/alertmanager/templates/
# - Kubernetes: Use ConfigMap mounted at /etc/alertmanager/templates/
# - Local: Use relative path like './prometheus/alert_templates.tmpl' or absolute path
# Templates are optional - alerts.yml already includes runbook_url annotations
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree
route:
  # Default receiver
  receiver: 'default'
  
  # Group alerts by alertname and severity
  group_by: ['alertname', 'severity', 'component']
  
  # Wait before sending first notification
  group_wait: 10s
  
  # Wait before sending notification about new alerts in group
  group_interval: 10s
  
  # Minimum time between two notifications
  repeat_interval: 12h
  
  # Child routes
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'oncall-critical'
      continue: false
    
    # Rate limiter alerts
    - match:
        component: rate_limiter
      receiver: 'rate-limiter-team'
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 6h
    
    # Redis alerts
    - match:
        component: redis
      receiver: 'redis-team'
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 6h
    
    # Warning alerts
    - match:
        severity: warning
      receiver: 'default'
      group_wait: 5m
      group_interval: 15m
      repeat_interval: 24h

# Inhibition rules (suppress lower severity when higher severity fires)
inhibit_rules:
  # Suppress warning when critical fires for same alert
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'component']
  
  # Suppress HighRateLimitViolations when CriticalRateLimitViolations fires
  - source_match:
      alertname: 'CriticalRateLimitViolations'
    target_match:
      alertname: 'HighRateLimitViolations'
    equal: ['limit_name', 'env', 'service']
  
  # Suppress HighRedisFailures when CriticalRedisFailures fires
  - source_match:
      alertname: 'CriticalRedisFailures'
    target_match:
      alertname: 'HighRedisFailures'
    equal: ['env', 'service']
  
  # Suppress RedisFallbackOccurred when RedisFallbackSustained fires
  - source_match:
      alertname: 'RedisFallbackSustained'
    target_match:
      alertname: 'RedisFallbackOccurred'
    equal: ['env', 'service']

# Receivers
receivers:
  # Default receiver
  - name: 'default'
    # No webhook configured - alerts will be logged but not sent
    # To enable notifications, configure email_configs or webhook_configs below
    # webhook_configs:
    #   - url: 'http://localhost:5001/webhook'
    #     send_resolved: true
  
  # Critical alerts - on-call
  - name: 'oncall-critical'
    # No receivers configured - configure email_configs, slack_configs, or pagerduty_configs
    # See docs/security/ALERTMANAGER_RECEIVERS_GUIDE.md for setup instructions
    # 
    # Example email configuration:
    # email_configs:
    #   - to: 'oncall@example.com'
    #     smarthost: 'smtp.gmail.com:587'
    #     auth_username: 'your-email@gmail.com'
    #     auth_password: 'your-app-password'
    #     headers:
    #       Subject: 'CRITICAL: {{ .GroupLabels.alertname }}'
    #     html: |
    #       <h2>Critical Alert: {{ .GroupLabels.alertname }}</h2>
    #       <p><strong>Severity:</strong> {{ .GroupLabels.severity }}</p>
    #       <p><strong>Environment:</strong> {{ .GroupLabels.env }}</p>
    #       <p><strong>Description:</strong> {{ .Annotations.description }}</p>
    #       <p><a href="{{ .Annotations.runbook_url }}">View Runbook</a></p>
  
  # Rate limiter team
  - name: 'rate-limiter-team'
    # No receivers configured - configure email_configs or slack_configs
    # See docs/security/ALERTMANAGER_RECEIVERS_GUIDE.md for setup instructions
  
  # Redis team
  - name: 'redis-team'
    # No receivers configured - configure email_configs or slack_configs
    # See docs/security/ALERTMANAGER_RECEIVERS_GUIDE.md for setup instructions

