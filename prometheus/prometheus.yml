# Prometheus Configuration
# Scrapes metrics from FastAPI application and evaluates alert rules

global:
  scrape_interval: 15s      # How frequently to scrape targets
  evaluation_interval: 15s  # How frequently to evaluate alert rules
  external_labels:
    cluster: 'lesson-planner'
    environment: 'production'  # Update to staging/dev as needed

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'  # Update if Alertmanager is hosted elsewhere
      # Optional: Add basic auth if needed
      # basic_auth:
      #   username: 'prometheus'
      #   password: 'your-password'

# Load alert rules
rule_files:
  - 'alerts.yml'  # Path relative to Prometheus config directory

# Scrape configurations
scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']  # Prometheus scrapes itself from inside container
    metrics_path: '/metrics'

  # Scrape FastAPI application
  - job_name: 'lesson-planner-api'
    static_configs:
      - targets:
          - 'host.docker.internal:8000'  # Windows Docker Desktop: use host.docker.internal to reach host
          # For Linux/Mac, use: 'localhost:8000' or 'host.docker.internal:8000'
        labels:
          service: 'lesson-planner-api'
          env: 'dev'  # Update to staging/prod as needed
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    # Optional: Add basic auth if your /metrics endpoint requires it
    # basic_auth:
    #   username: 'prometheus'
    #   password: 'your-metrics-password'

  # Optional: Scrape Redis if you want Redis metrics
  # - job_name: 'redis'
  #   static_configs:
  #     - targets:
  #         - 'localhost:6379'  # Redis exporter port (if using redis_exporter)
  #   metrics_path: '/metrics'

  # Optional: Scrape Alertmanager
  # - job_name: 'alertmanager'
  #   static_configs:
  #     - targets:
  #         - 'alertmanager:9093'
  #   metrics_path: '/metrics'

