groups:
  - name: rate_limiter
    interval: 30s
    rules:
      # High rate limit violations
      - alert: HighRateLimitViolations
        expr: |
          sum(rate(limiter_blocked_total[5m])) by (limit_name, env, service) > 10
        for: 5m
        labels:
          severity: warning
          component: rate_limiter
        annotations:
          summary: "High rate of rate limit violations"
          description: |
            {{ $value | humanize }} requests blocked per second in last 5 minutes.
            Limit: {{ $labels.limit_name }}
            Environment: {{ $labels.env }}
            Service: {{ $labels.service }}
          runbook_url: "https://your-docs-site.com/docs/security/ALERT_RUNBOOK.md#high-rate-limit-violations"

      # Critical rate limit violations
      - alert: CriticalRateLimitViolations
        expr: |
          sum(rate(limiter_blocked_total[5m])) by (limit_name, env, service) > 50
        for: 2m
        labels:
          severity: critical
          component: rate_limiter
        annotations:
          summary: "Critical rate of rate limit violations"
          description: |
            {{ $value | humanize }} requests blocked per second in last 5 minutes.
            This may indicate an attack or misconfiguration.
            Limit: {{ $labels.limit_name }}
            Environment: {{ $labels.env }}
          runbook_url: "https://your-docs-site.com/docs/security/ALERT_RUNBOOK.md#critical-rate-limit-violations"

      # Rate limit violations on auth endpoints
      - alert: AuthEndpointRateLimitViolations
        expr: |
          sum(rate(limiter_blocked_total{limit_name="auth"}[5m])) by (env, service) > 5
        for: 5m
        labels:
          severity: warning
          component: rate_limiter
        annotations:
          summary: "High rate limit violations on auth endpoints"
          description: |
            {{ $value | humanize }} auth requests blocked per second.
            This may indicate brute force attempts or legitimate users being blocked.
            Environment: {{ $labels.env }}
          runbook_url: "https://your-docs-site.com/docs/security/ALERT_RUNBOOK.md#auth-endpoint-rate-limit-violations"

  - name: redis_circuit_breaker
    interval: 30s
    rules:
      # Circuit breaker opened
      - alert: RedisCircuitBreakerOpen
        expr: redis_circuit_open == 1
        for: 1m
        labels:
          severity: critical
          component: redis
        annotations:
          summary: "Redis circuit breaker is open"
          description: |
            Rate limiting may be degraded. Circuit breaker opened due to Redis connection failures.
            Environment: {{ $labels.env }}
            Service: {{ $labels.service }}
            Action: Check Redis connectivity and health endpoint.
          runbook_url: "https://your-docs-site.com/docs/security/ALERT_RUNBOOK.md#redis-circuit-breaker-open"

      # Circuit breaker open for extended period
      - alert: RedisCircuitBreakerOpenExtended
        expr: redis_circuit_open == 1
        for: 10m
        labels:
          severity: critical
          component: redis
        annotations:
          summary: "Redis circuit breaker open for extended period"
          description: |
            Circuit breaker has been open for over 10 minutes.
            Rate limiting is likely degraded. Immediate investigation required.
            Environment: {{ $labels.env }}
          runbook_url: "https://your-docs-site.com/docs/security/ALERT_RUNBOOK.md#redis-circuit-breaker-open-extended"

  - name: redis_health
    interval: 30s
    rules:
      # High Redis connection failures
      - alert: HighRedisFailures
        expr: |
          sum(rate(redis_failure_total[5m])) by (error_type, env, service) > 5
        for: 5m
        labels:
          severity: warning
          component: redis
        annotations:
          summary: "High rate of Redis connection failures"
          description: |
            {{ $value | humanize }} Redis failures per second in last 5 minutes.
            Error type: {{ $labels.error_type }}
            Environment: {{ $labels.env }}
            Service: {{ $labels.service }}
          runbook_url: "https://your-docs-site.com/docs/security/ALERT_RUNBOOK.md#high-redis-failures"

      # Critical Redis connection failures
      - alert: CriticalRedisFailures
        expr: |
          sum(rate(redis_failure_total[5m])) by (error_type, env, service) > 20
        for: 2m
        labels:
          severity: critical
          component: redis
        annotations:
          summary: "Critical rate of Redis connection failures"
          description: |
            {{ $value | humanize }} Redis failures per second.
            Circuit breaker may open soon. Immediate action required.
            Error type: {{ $labels.error_type }}
            Environment: {{ $labels.env }}
          runbook_url: "https://your-docs-site.com/docs/security/ALERT_RUNBOOK.md#critical-redis-failures"

      # Fallback to memory storage
      - alert: RedisFallbackOccurred
        expr: |
          increase(redis_fallback_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          component: redis
        annotations:
          summary: "Rate limiter fell back to memory storage"
          description: |
            Redis unavailable, using in-memory storage.
            Rate limits are now per-instance (not shared across instances).
            Environment: {{ $labels.env }}
            Service: {{ $labels.service }}
          runbook_url: "https://your-docs-site.com/docs/security/ALERT_RUNBOOK.md#redis-fallback-occurred"

      # Sustained fallback
      - alert: RedisFallbackSustained
        expr: |
          increase(redis_fallback_total[10m]) > 10
        for: 5m
        labels:
          severity: critical
          component: redis
        annotations:
          summary: "Sustained fallback to memory storage"
          description: |
            Multiple fallbacks to memory storage detected.
            Redis connectivity issues persist. Rate limiting degraded.
            Environment: {{ $labels.env }}
          runbook_url: "https://your-docs-site.com/docs/security/ALERT_RUNBOOK.md#redis-fallback-sustained"

  - name: rate_limiter_performance
    interval: 30s
    rules:
      # High rate limit check latency
      - alert: HighRateLimitLatency
        expr: |
          histogram_quantile(0.95, 
            sum(rate(rate_limit_check_duration_seconds_bucket[5m])) by (le, limit_name, env, service)
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          component: rate_limiter
        annotations:
          summary: "High rate limit check latency"
          description: |
            95th percentile latency is {{ $value }}s (threshold: 0.1s).
            Limit: {{ $labels.limit_name }}
            Environment: {{ $labels.env }}
          runbook_url: "https://your-docs-site.com/docs/security/ALERT_RUNBOOK.md#high-rate-limit-latency"

      # Critical rate limit check latency
      - alert: CriticalRateLimitLatency
        expr: |
          histogram_quantile(0.95, 
            sum(rate(rate_limit_check_duration_seconds_bucket[5m])) by (le, limit_name, env, service)
          ) > 0.5
        for: 2m
        labels:
          severity: critical
          component: rate_limiter
        annotations:
          summary: "Critical rate limit check latency"
          description: |
            95th percentile latency is {{ $value }}s (threshold: 0.5s).
            Rate limiting may be impacting user experience.
            Limit: {{ $labels.limit_name }}
            Environment: {{ $labels.env }}
          runbook_url: "https://your-docs-site.com/docs/security/ALERT_RUNBOOK.md#critical-rate-limit-latency"

  - name: rate_limiter_ratio
    interval: 1m
    rules:
      # High block ratio
      - alert: HighRateLimitBlockRatio
        expr: |
          (
            sum(rate(limiter_blocked_total[5m])) by (limit_name, env, service)
            /
            sum(rate(limiter_allowed_total[5m]) + rate(limiter_blocked_total[5m])) by (limit_name, env, service)
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          component: rate_limiter
        annotations:
          summary: "High rate limit block ratio"
          description: |
            {{ $value | humanizePercentage }} of requests are being blocked.
            This may indicate limits are too strict or an attack.
            Limit: {{ $labels.limit_name }}
            Environment: {{ $labels.env }}
          runbook_url: "https://your-docs-site.com/docs/security/ALERT_RUNBOOK.md#high-rate-limit-block-ratio"

      # Critical block ratio
      - alert: CriticalRateLimitBlockRatio
        expr: |
          (
            sum(rate(limiter_blocked_total[5m])) by (limit_name, env, service)
            /
            sum(rate(limiter_allowed_total[5m]) + rate(limiter_blocked_total[5m])) by (limit_name, env, service)
          ) > 0.3
        for: 2m
        labels:
          severity: critical
          component: rate_limiter
        annotations:
          summary: "Critical rate limit block ratio"
          description: |
            {{ $value | humanizePercentage }} of requests are being blocked.
            Immediate investigation required.
            Limit: {{ $labels.limit_name }}
            Environment: {{ $labels.env }}
          runbook_url: "https://your-docs-site.com/docs/security/ALERT_RUNBOOK.md#critical-rate-limit-block-ratio"

