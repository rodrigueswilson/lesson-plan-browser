name: Android Build

on:
  workflow_dispatch:
  push:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'tools/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libssl-dev
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Install Android NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "ndk;25.1.8937393"
        
    - name: Set environment variables
      run: |
        echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.1.8937393" >> $GITHUB_ENV
        echo "NDK_HOME=$ANDROID_HOME/ndk/25.1.8937393" >> $GITHUB_ENV
        echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_HOME/ndk/25.1.8937393/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang" >> $GITHUB_ENV
        
    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Install Node.js dependencies
      run: |
        cd frontend
        npm install
        
    - name: Build frontend
      run: |
        cd frontend
        npm run build:skip-check
        
    - name: Install Tauri CLI
      run: cargo install tauri-cli --version "^2.0"
      
    - name: Build Android APK
      run: |
        cd frontend/src-tauri
        cargo tauri android build
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: app-arm64-debug-apk
        path: frontend/src-tauri/gen/android/app/build/outputs/apk/arm64/debug/app-arm64-debug.apk
        retention-days: 30
        
    - name: Display APK info
      run: |
        cd frontend/src-tauri/gen/android/app/build/outputs/apk/arm64/debug
        ls -la *.apk
        file app-arm64-debug.apk
