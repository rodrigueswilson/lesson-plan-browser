name: Fast Android Build (Gradle Only)

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'lesson-plan-browser/frontend/src-tauri/gen/android/**'
  workflow_dispatch:

jobs:
  build-gradle:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: lesson-plan-browser/frontend/src-tauri/gen/android

      - name: Build with Gradle (x86_64 Debug)
        run: ./gradlew assembleX86_64Debug --stacktrace
        working-directory: lesson-plan-browser/frontend/src-tauri/gen/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-x86_64-debug
          path: lesson-plan-browser/frontend/src-tauri/gen/android/app/build/outputs/apk/*/debug/*.apk
