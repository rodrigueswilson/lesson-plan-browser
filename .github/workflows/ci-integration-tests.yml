name: Integration Tests (Postgres)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/ci-integration-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/ci-integration-tests.yml'

env:
  PYTHON_VERSION: '3.11'
  POSTGRES_VERSION: '15'
  POSTGRES_DB: 'test_lesson_planner'
  POSTGRES_USER: 'test_user'
  POSTGRES_PASSWORD: 'test_password'

jobs:
  integration-tests-postgres:
    name: Integration Tests (Postgres)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client libpq-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary  # PostgreSQL adapter for Python

      - name: Wait for Postgres to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U ${{ env.POSTGRES_USER }}; do
            echo "Waiting for Postgres..."
            sleep 2
          done
          echo "Postgres is ready!"

      - name: Create test database schema
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: ${{ env.POSTGRES_DB }}
          PGUSER: ${{ env.POSTGRES_USER }}
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          python << 'EOF'
          import psycopg2
          from psycopg2 import sql
          
          conn = psycopg2.connect(
              host="localhost",
              port=5432,
              database="${{ env.POSTGRES_DB }}",
              user="${{ env.POSTGRES_USER }}",
              password="${{ env.POSTGRES_PASSWORD }}"
          )
          conn.autocommit = True
          cursor = conn.cursor()
          
          # Create users table
          cursor.execute("""
              CREATE TABLE IF NOT EXISTS users (
                  id TEXT PRIMARY KEY,
                  name TEXT NOT NULL,
                  first_name TEXT,
                  last_name TEXT,
                  email TEXT,
                  base_path_override TEXT,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              )
          """)
          
          # Create class_slots table
          cursor.execute("""
              CREATE TABLE IF NOT EXISTS class_slots (
                  id TEXT PRIMARY KEY,
                  user_id TEXT NOT NULL,
                  slot_number INTEGER NOT NULL,
                  subject TEXT NOT NULL,
                  grade TEXT NOT NULL,
                  homeroom TEXT,
                  proficiency_levels TEXT,
                  primary_teacher_file TEXT,
                  primary_teacher_name TEXT,
                  primary_teacher_first_name TEXT,
                  primary_teacher_last_name TEXT,
                  primary_teacher_file_pattern TEXT,
                  display_order INTEGER DEFAULT NULL,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE,
                  UNIQUE(user_id, slot_number)
              )
          """)
          
          # Create weekly_plans table
          cursor.execute("""
              CREATE TABLE IF NOT EXISTS weekly_plans (
                  id TEXT PRIMARY KEY,
                  user_id TEXT NOT NULL,
                  week_of TEXT NOT NULL,
                  week_folder_path TEXT,
                  generated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE
              )
          """)
          
          # Create performance_metrics table
          cursor.execute("""
              CREATE TABLE IF NOT EXISTS performance_metrics (
                  id TEXT PRIMARY KEY,
                  plan_id TEXT NOT NULL,
                  metric_name TEXT NOT NULL,
                  metric_value REAL,
                  metric_unit TEXT,
                  recorded_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  FOREIGN KEY (plan_id) REFERENCES weekly_plans(id) ON DELETE CASCADE
              )
          """)
          
          # Create indices for RLS performance (if needed)
          cursor.execute("""
              CREATE INDEX IF NOT EXISTS idx_class_slots_user_id ON class_slots(user_id)
          """)
          cursor.execute("""
              CREATE INDEX IF NOT EXISTS idx_weekly_plans_user_id ON weekly_plans(user_id)
          """)
          cursor.execute("""
              CREATE INDEX IF NOT EXISTS idx_performance_metrics_plan_id ON performance_metrics(plan_id)
          """)
          
          cursor.close()
          conn.close()
          print("Schema created successfully")
          EOF

      - name: Run integration tests with Postgres
        env:
          DATABASE_URL: postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}
          USE_SUPABASE: 'False'
          USE_POSTGRES_TEST: 'True'  # Flag to use Postgres in tests
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Note: Tests currently use SQLite fixtures
          # To use Postgres, set USE_POSTGRES_TEST=True and use postgres fixtures
          # For now, we run SQLite tests to ensure they pass
          pytest tests/test_integration_authorization.py -v --tb=short
          
          # Future: Run Postgres-specific tests when fixtures are ready
          # pytest tests/test_integration_authorization.py -v --tb=short -k postgres || true

      - name: Run authorization unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/test_authorization.py -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            .pytest_cache/
          retention-days: 7

  integration-tests-sqlite:
    name: Integration Tests (SQLite - Fallback)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests with SQLite
        env:
          DATABASE_URL: sqlite:///./data/test_lesson_planner.db
          USE_SUPABASE: 'False'
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/test_integration_authorization.py -v --tb=short

      - name: Run authorization unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/test_authorization.py -v --tb=short

  test-summary:
    name: Test Summary
    needs: [integration-tests-postgres, integration-tests-sqlite]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.integration-tests-postgres.result }}" == "failure" ] || [ "${{ needs.integration-tests-sqlite.result }}" == "failure" ]; then
            echo "❌ Some tests failed"
            exit 1
          else
            echo "✅ All tests passed"
          fi

